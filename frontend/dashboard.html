<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TravelPals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="dashboard.html">✈ TravelPals</a>
    <div class="nav-links">
      <a href="dashboard.html" class="active">Trips</a>
      <a href="hotels.html">Hotels</a>
      <a href="profile.html" id="nav-profile">Profile</a>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2>Discover Trips</h2>
      <a href="create-trip.html" class="btn btn-primary">+ Create Trip</a>
    </div>

    <div class="filter-bar">
      <input type="text" id="filter-destination" placeholder="Destination..." oninput="loadTrips()" />
      <input type="text" id="filter-country" placeholder="Country..." oninput="loadTrips()" />
      <button class="btn btn-outline btn-sm" onclick="clearFilters()">Clear</button>
    </div>

    <div id="trips-grid" class="card-grid">
      <p class="loading">Loading trips...</p>
    </div>
  </main>

  <!-- Trip detail modal -->
  <div id="trip-modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <button class="modal-close-btn" onclick="closeTrip()" title="Close">&times;</button>
      <div id="modal-body" class="modal-body">
        <p class="loading" style="padding:2rem">Loading...</p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    requireLogin();

    const me = getUser();
    if (me) document.getElementById('nav-profile').href = `profile.html?id=${me.id}`;

    let currentTripId = null;

    // ── Trip grid ──────────────────────────────────────────────────────────────

    async function loadTrips() {
      const dest    = document.getElementById('filter-destination').value.trim();
      const country = document.getElementById('filter-country').value.trim();

      let url = '/api/trips';
      const params = new URLSearchParams();
      if (dest)    params.set('destination', dest);
      if (country) params.set('country', country);
      if (params.toString()) url += '?' + params.toString();

      const grid = document.getElementById('trips-grid');
      try {
        const trips = await apiFetch(url);
        if (!trips.length) {
          grid.innerHTML = '<p class="empty-msg">No trips found. Be the first to create one!</p>';
          return;
        }
        grid.innerHTML = trips.map(renderTripCard).join('');
      } catch (err) {
        grid.innerHTML = `<p class="error-msg">${err.message}</p>`;
      }
    }

    function renderTripCard(t) {
      const startDate = new Date(t.start_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const endDate   = new Date(t.end_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const spots = t.max_members - t.member_count;
      return `
        <div class="trip-card" onclick="openTrip(${t.id})">
          <div class="trip-card-header">
            <span class="trip-destination">📍 ${t.destination}, ${t.country}</span>
            <span class="trip-spots ${spots === 0 ? 'full' : ''}">${spots === 0 ? 'Full' : spots + ' spot' + (spots !== 1 ? 's' : '') + ' left'}</span>
          </div>
          <h3 class="trip-title">${t.title}</h3>
          <p class="trip-desc">${t.description || 'No description provided.'}</p>
          <div class="trip-meta">
            <span>🗓 ${startDate} – ${endDate}</span>
            <span>👥 ${t.member_count}/${t.max_members} members</span>
          </div>
          <div class="trip-creator">by ${t.creator_name}</div>
        </div>`;
    }

    function clearFilters() {
      document.getElementById('filter-destination').value = '';
      document.getElementById('filter-country').value = '';
      loadTrips();
    }

    // ── Modal ──────────────────────────────────────────────────────────────────

    async function openTrip(id) {
      currentTripId = id;
      document.getElementById('trip-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      document.getElementById('modal-body').innerHTML = '<p class="loading" style="padding:2rem">Loading trip...</p>';

      try {
        const trip = await apiFetch(`/api/trips/${id}`);
        renderModal(trip);
        loadModalHotels(trip.destination, trip.start_date, trip.end_date);
      } catch (err) {
        document.getElementById('modal-body').innerHTML = `<p class="error-msg" style="padding:2rem">${err.message}</p>`;
      }
    }

    function closeTrip() {
      document.getElementById('trip-modal').style.display = 'none';
      document.body.style.overflow = '';
      currentTripId = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('trip-modal')) closeTrip();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrip(); });

    function renderModal(trip) {
      const isOwner  = me && trip.creator_id === me.id;
      const isMember = me && trip.members.some(m => m.id === me.id);
      const isFull   = trip.members.length >= trip.max_members;

      const startDate = new Date(trip.start_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      const endDate   = new Date(trip.end_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

      document.getElementById('modal-body').innerHTML = `
        <div class="modal-left">
          <div class="trip-detail-header">
            <div>
              <h1>${trip.title}</h1>
              <p class="trip-location">📍 ${trip.destination}, ${trip.country}</p>
            </div>
            ${isOwner ? `
              <div class="owner-actions">
                <a href="create-trip.html?id=${trip.id}" class="btn btn-outline btn-sm">Edit</a>
                <button class="btn btn-danger btn-sm" onclick="deleteTrip()">Delete</button>
              </div>` : ''}
          </div>

          <div class="trip-detail-meta">
            <div class="meta-item">
              <span class="meta-label">Dates</span>
              <span>🗓 ${startDate} – ${endDate}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Members</span>
              <span>👥 ${trip.members.length}/${trip.max_members}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Organiser</span>
              <span>${trip.creator_name}</span>
            </div>
          </div>

          ${trip.description ? `<p class="trip-detail-desc">${trip.description}</p>` : ''}

          ${!isOwner ? `
            <div class="join-section">
              ${isMember
                ? `<button class="btn btn-danger" onclick="leaveTrip(${trip.id})">Leave Trip</button>`
                : isFull
                  ? `<button class="btn btn-primary" disabled>Trip is Full</button>`
                  : `<button class="btn btn-primary" onclick="joinTrip(${trip.id})">Join Trip</button>`
              }
            </div>` : ''}

          <h2 class="section-title">Members (${trip.members.length})</h2>
          <div class="members-grid">
            ${trip.members.map(m => `
              <a href="profile.html?id=${m.id}" class="member-card">
                <div class="member-avatar">${m.name[0].toUpperCase()}</div>
                <div class="member-info">
                  <strong>${m.name}</strong>
                  ${m.age ? `<span>${m.age} yrs</span>` : ''}
                  ${m.hobbies && m.hobbies.length
                    ? `<span class="hobby-tags">${m.hobbies.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}</span>`
                    : ''}
                </div>
              </a>`).join('')}
          </div>
        </div>

        <div class="modal-right">
          <h2 class="section-title">🏨 Hotels in ${trip.destination}</h2>
          <div id="modal-hotels"><p class="loading">Searching hotels...</p></div>
        </div>`;
    }

    async function loadModalHotels(destination, startDate, endDate) {
      const el = document.getElementById('modal-hotels');
      if (!el) return;
      try {
        const hotels = await apiFetch(
          `/api/hotels/search?destination=${encodeURIComponent(destination)}&arrival_date=${startDate}&departure_date=${endDate}`
        );
        if (!hotels.length) {
          el.innerHTML = '<p style="color:var(--muted);font-size:.9rem">No hotels found for this destination.</p>';
          return;
        }
        el.innerHTML = hotels.map(h => renderModalHotelCard(h, destination, startDate, endDate)).join('');
      } catch (err) {
        el.innerHTML = `<p style="color:var(--muted);font-size:.9rem">${
          err.message.includes('not configured')
            ? 'Add RAPIDAPI_KEY to backend/.env to enable hotel search.'
            : err.message
        }</p>`;
      }
    }

    function renderModalHotelCard(h, destination, arrival, departure) {
      const stars = h.stars ? '⭐'.repeat(Math.min(Math.round(h.stars), 5)) : '';
      const score = h.score ? `<span class="hotel-score">${h.score} <small>${h.scoreWord || ''}</small></span>` : '';
      const price = h.price ? `<span class="hotel-price">From €${Math.round(h.price)}</span>` : '';
      const bookUrl = `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(h.name + ' ' + destination)}&checkin=${arrival}&checkout=${departure}&group_adults=2&no_rooms=1&selected_currency=EUR`;

      return `
        <div class="hotel-card-modal">
          ${h.photo
            ? `<img class="hotel-photo-modal" src="${h.photo}" alt="${h.name}" loading="lazy" />`
            : '<div class="hotel-photo-placeholder-modal">🏨</div>'}
          <div class="hotel-body">
            <h3 class="hotel-name">${h.name}</h3>
            <div class="hotel-footer">
              <div>${stars} ${score}</div>
              <div>${price}</div>
            </div>
            <a href="${bookUrl}" target="_blank" rel="noopener" class="btn btn-primary btn-sm hotel-book-btn">
              Book on Booking.com ↗
            </a>
          </div>
        </div>`;
    }

    // ── Trip actions ───────────────────────────────────────────────────────────

    async function joinTrip(id) {
      try {
        await apiFetch(`/api/trips/${id}/join`, { method: 'POST' });
        openTrip(id);
        loadTrips();
      } catch (err) {
        alert(err.message);
      }
    }

    async function leaveTrip(id) {
      if (!confirm('Leave this trip?')) return;
      try {
        await apiFetch(`/api/trips/${id}/leave`, { method: 'DELETE' });
        openTrip(id);
        loadTrips();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteTrip() {
      if (!confirm('Delete this trip? This cannot be undone.')) return;
      try {
        await apiFetch(`/api/trips/${currentTripId}`, { method: 'DELETE' });
        closeTrip();
        loadTrips();
      } catch (err) {
        alert(err.message);
      }
    }

    loadTrips();
  </script>
</body>
</html>
